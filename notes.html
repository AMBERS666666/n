<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>笔记</title>
<style>
  /* ============ 设计语言：仿明刻本 + 现代克制 ============ */
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700;900&family=ZCOOL+QingKe+HuangYou&display=swap');

  :root {
    --ink: #1a1614;
    --ink-soft: #3a322c;
    --paper: #f4ede0;
    --paper-deep: #ebe1cd;
    --vermillion: #a62828;       /* 朱砂 */
    --vermillion-deep: #7a1818;
    --seal-red: #b8342f;
    --gold: #8b6914;
    --jade: #4a6b52;
    --rule: #c9b896;
    --shadow: rgba(26,22,20,0.12);
    --correct-bg: #d4e3d4;
    --correct-fg: #2d5230;
    --wrong-bg: #f3d4d0;
    --wrong-fg: #8a2520;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    min-height: 100vh;
    background: var(--paper);
    background-image:
      radial-gradient(ellipse at top left, rgba(166,40,40,0.04), transparent 50%),
      radial-gradient(ellipse at bottom right, rgba(139,105,20,0.05), transparent 50%),
      repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(26,22,20,0.012) 2px, rgba(26,22,20,0.012) 3px);
    font-family: 'Noto Serif SC', 'Songti SC', 'STSong', serif;
    color: var(--ink);
  }

  .app { max-width: 980px; margin: 0 auto; padding: 32px 24px 80px; }

  /* ============ 顶部 ============ */
  header {
    padding: 0;
    margin-bottom: 16px;
  }

  /* ============ 控制面板 ============ */
  .controls {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 28px;
    padding: 18px;
    background: rgba(255,255,255,0.4);
    border: 1px solid var(--rule);
  }

  .ctrl-group { display: flex; flex-direction: column; gap: 6px; }
  .ctrl-group label {
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--ink-soft);
    text-transform: uppercase;
  }
  select, button {
    font-family: inherit;
    border: 1px solid var(--ink);
    background: var(--paper);
    color: var(--ink);
    padding: 8px 14px;
    font-size: 15px;
    cursor: pointer;
    transition: all 0.2s;
  }
  select:hover { background: var(--paper-deep); }

  .mode-tabs {
    display: flex;
    gap: 0;
    margin-bottom: 24px;
    border-bottom: 1px solid var(--rule);
  }
  .tab {
    flex: 1;
    padding: 12px 8px;
    background: transparent;
    border: none;
    border-bottom: 3px solid transparent;
    font-family: inherit;
    font-size: 14px;
    letter-spacing: 4px;
    color: var(--ink-soft);
    cursor: pointer;
    transition: all 0.2s;
  }
  .tab.active {
    color: var(--vermillion-deep);
    border-bottom-color: var(--vermillion);
    font-weight: 600;
  }
  .tab:hover:not(.active) { color: var(--ink); background: rgba(0,0,0,0.02); }

  /* ============ 统计面板 ============ */
  .stats {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 1px;
    background: var(--rule);
    border: 1px solid var(--rule);
    margin-bottom: 24px;
  }
  .stat {
    background: var(--paper);
    padding: 12px 8px;
    text-align: center;
  }
  .stat .num {
    font-size: 26px;
    font-weight: 700;
    color: var(--ink);
    font-family: 'Noto Serif SC', serif;
    display: block;
    line-height: 1;
  }
  .stat .lbl {
    font-size: 11px;
    color: var(--ink-soft);
    letter-spacing: 2px;
    margin-top: 4px;
    display: block;
  }
  .stat.acc .num { color: var(--vermillion); }
  .stat.wrong .num { color: var(--seal-red); }

  /* ============ 题面 ============ */
  .question-card {
    background: rgba(255,255,255,0.5);
    border: 1px solid var(--rule);
    padding: 32px 32px 28px;
    margin-bottom: 24px;
    position: relative;
    box-shadow: 0 2px 0 var(--shadow);
  }
  .question-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--vermillion) 0%, var(--vermillion) 30%, transparent 30%, transparent 70%, var(--gold) 70%, var(--gold) 100%);
  }

  .meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 12px;
    color: var(--ink-soft);
    letter-spacing: 2px;
    margin-bottom: 18px;
    padding-bottom: 12px;
    border-bottom: 1px dashed var(--rule);
  }
  .meta .badge {
    background: var(--ink);
    color: var(--paper);
    padding: 2px 10px;
    font-size: 11px;
    letter-spacing: 2px;
  }
  .meta .qid { font-family: monospace; opacity: 0.6; }

  .question-text {
    font-size: 19px;
    line-height: 2;
    color: var(--ink);
    margin-bottom: 20px;
    text-align: justify;
  }

  /* 内嵌输入框 */
  .blank-input {
    display: inline-block;
    min-width: 80px;
    max-width: 100%;
    padding: 2px 8px;
    margin: 0 3px;
    border: none;
    border-bottom: 2px solid var(--vermillion);
    background: rgba(166,40,40,0.05);
    font-family: inherit;
    font-size: 17px;
    color: var(--ink);
    text-align: center;
    transition: all 0.2s;
    outline: none;
  }
  .blank-input:focus {
    background: rgba(166,40,40,0.12);
    border-bottom-width: 3px;
  }
  .blank-input.correct {
    background: var(--correct-bg);
    border-bottom-color: var(--correct-fg);
    color: var(--correct-fg);
  }
  .blank-input.partial {
    background: #fbeed8;
    border-bottom-color: #b88528;
    color: #6e4d10;
  }
  .blank-input.wrong {
    background: var(--wrong-bg);
    border-bottom-color: var(--wrong-fg);
    color: var(--wrong-fg);
    text-decoration: line-through;
  }
  .blank-input.reveal {
    background: rgba(74,107,82,0.1);
    border-bottom-color: var(--jade);
    color: var(--ink-soft);
    font-style: italic;
  }
  .blank-num {
    display: inline-block;
    min-width: 22px;
    height: 22px;
    line-height: 22px;
    background: var(--vermillion);
    color: var(--paper);
    border-radius: 50%;
    font-size: 12px;
    text-align: center;
    margin: 0 4px 0 0;
    font-family: 'Noto Serif SC', serif;
    vertical-align: middle;
  }

  /* 行内正解：紧贴输入框右侧显示 */
  .inline-answer {
    display: inline-block;
    margin: 0 6px 0 4px;
    padding: 1px 10px 1px 6px;
    background: linear-gradient(90deg, rgba(74,107,82,0.08), rgba(74,107,82,0.18));
    border: 1px solid var(--jade);
    border-radius: 2px;
    font-size: 15px;
    color: var(--correct-fg);
    font-weight: 600;
    vertical-align: baseline;
    animation: slideIn 0.3s ease-out;
    white-space: nowrap;
  }
  .inline-answer .ia-arrow {
    color: var(--jade);
    margin-right: 4px;
    font-weight: 400;
    opacity: 0.6;
  }
  .inline-answer .ia-text {
    font-family: 'Noto Serif SC', serif;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateX(-6px); }
    to { opacity: 1; transform: translateX(0); }
  }

  /* ============ 操作按钮 ============ */
  .actions {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    justify-content: center;
    margin-top: 20px;
  }
  .btn {
    border: 1px solid var(--ink);
    background: var(--paper);
    color: var(--ink);
    padding: 10px 24px;
    font-family: inherit;
    font-size: 14px;
    letter-spacing: 4px;
    cursor: pointer;
    transition: all 0.15s;
    min-width: 100px;
  }
  .btn:hover { background: var(--ink); color: var(--paper); }
  .btn.primary {
    background: var(--vermillion);
    color: var(--paper);
    border-color: var(--vermillion);
  }
  .btn.primary:hover {
    background: var(--vermillion-deep);
    border-color: var(--vermillion-deep);
  }
  .btn.ghost {
    background: transparent;
    border: 1px dashed var(--ink-soft);
    color: var(--ink-soft);
  }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* 键盘提示 keycap */
  .kbd {
    display: inline-block;
    margin-left: 6px;
    padding: 1px 6px;
    font-size: 11px;
    font-family: ui-monospace, 'SF Mono', Menlo, monospace;
    letter-spacing: 0;
    border: 1px solid currentColor;
    border-radius: 3px;
    opacity: 0.7;
    vertical-align: 1px;
  }

  .kbd-hint {
    text-align: center;
    margin: 14px 0 8px;
    font-size: 11px;
    color: var(--ink-soft);
    letter-spacing: 1px;
    opacity: 0.8;
  }
  .kbd-hint .kbd { margin-left: 2px; margin-right: 4px; }

  /* ============ 结果横幅 ============ */
  .result-banner {
    display: none;
    text-align: center;
    padding: 14px;
    margin: 16px 0;
    font-size: 16px;
    letter-spacing: 4px;
    font-weight: 600;
    border: 1px solid;
  }
  .result-banner.show { display: block; }
  .result-banner.all-correct {
    background: var(--correct-bg);
    color: var(--correct-fg);
    border-color: var(--correct-fg);
  }
  .result-banner.has-wrong {
    background: var(--wrong-bg);
    color: var(--wrong-fg);
    border-color: var(--wrong-fg);
  }
  .result-banner .seal {
    display: inline-block;
    width: 36px;
    height: 36px;
    line-height: 32px;
    border: 2px solid currentColor;
    border-radius: 4px;
    transform: rotate(-8deg);
    margin: 0 12px;
    font-family: 'ZCOOL QingKe HuangYou', serif;
    font-size: 22px;
  }

  /* ============ 进度条 ============ */
  .progress-wrap {
    margin-bottom: 16px;
  }
  .progress-bar {
    height: 4px;
    background: var(--paper-deep);
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--vermillion), var(--gold));
    width: 0;
    transition: width 0.3s;
  }
  .progress-text {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: var(--ink-soft);
    letter-spacing: 2px;
    margin-top: 6px;
  }

  /* ============ 错题列表 ============ */
  .wrong-list {
    display: none;
  }
  .wrong-list.show { display: block; }
  .wrong-list-empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--ink-soft);
    font-size: 16px;
    letter-spacing: 4px;
  }
  .wrong-list-empty .seal {
    font-size: 48px;
    color: var(--vermillion);
    opacity: 0.4;
    margin-bottom: 16px;
  }

  /* ============ 听课区域 ============ */
  .listen-area { animation: fadeIn 0.35s ease-out; }

  .listen-controls {
    background: rgba(255,255,255,0.4);
    border: 1px solid var(--rule);
    padding: 18px;
    margin-bottom: 24px;
  }
  .listen-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 16px;
    margin-bottom: 12px;
  }
  .listen-row:last-child { margin-bottom: 0; }
  .listen-row.two { grid-template-columns: 1fr 1fr; }

  .listen-card {
    background: rgba(255,255,255,0.5);
    border: 1px solid var(--rule);
    padding: 32px;
    box-shadow: 0 2px 0 var(--shadow);
    position: relative;
  }
  .listen-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--jade) 0%, var(--jade) 30%, transparent 30%, transparent 70%, var(--gold) 70%, var(--gold) 100%);
  }

  .listen-text {
    min-height: 200px;
    max-height: 50vh;
    overflow-y: auto;
    margin: 18px 0;
    padding: 18px 22px;
    background: rgba(74,107,82,0.04);
    border-left: 3px solid var(--jade);
    font-size: 17px;
    line-height: 2.1;
    color: var(--ink);
    white-space: pre-wrap;
    word-break: break-word;
  }
  .listen-text .sentence {
    transition: background 0.3s;
    padding: 1px 3px;
    border-radius: 2px;
  }
  .listen-text .sentence.active {
    background: linear-gradient(90deg, rgba(166,40,40,0.18), rgba(166,40,40,0.08));
    color: var(--vermillion-deep);
    font-weight: 600;
    box-shadow: 0 0 0 2px rgba(166,40,40,0.12);
  }
  .listen-text .blank-mark {
    display: inline-block;
    min-width: 30px;
    padding: 0 6px;
    margin: 0 2px;
    background: rgba(74,107,82,0.15);
    border-bottom: 2px solid var(--jade);
    color: var(--correct-fg);
    font-weight: 600;
    border-radius: 2px;
    font-size: 15px;
  }
  .listen-text .blank-num-inline {
    color: var(--vermillion);
    font-weight: 700;
  }

  .listen-progress {
    margin: 14px 0;
  }
  .listen-progress-bar {
    height: 4px;
    background: var(--paper-deep);
    overflow: hidden;
  }
  .listen-progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--jade), var(--gold));
    width: 0;
    transition: width 0.3s;
  }

  .listen-tip {
    margin-top: 14px;
    text-align: center;
    font-size: 11px;
    color: var(--ink-soft);
    letter-spacing: 2px;
    opacity: 0.7;
    min-height: 16px;
  }

  /* ============ 底部提示 ============ */
  footer {
    margin-top: 60px;
    padding-top: 20px;
    border-top: 1px solid var(--rule);
    text-align: center;
    font-size: 11px;
    color: var(--ink-soft);
    letter-spacing: 3px;
    opacity: 0.7;
  }
  footer p { margin: 4px 0; }

  /* ============ 移动端 ============ */
  @media (max-width: 640px) {
    .app { padding: 20px 14px 60px; }
    h1 { font-size: 26px; letter-spacing: 4px; }
    h1 .red { font-size: 20px; }
    .controls { grid-template-columns: 1fr; gap: 10px; padding: 12px; }
    .stats { grid-template-columns: repeat(2, 1fr); }
    .question-card { padding: 22px 18px; }
    .question-text { font-size: 17px; line-height: 1.9; }
    .blank-input { font-size: 16px; min-width: 70px; }
    .btn { padding: 9px 16px; font-size: 13px; letter-spacing: 2px; }
    .tab { font-size: 12px; letter-spacing: 2px; }
    .listen-row { grid-template-columns: 1fr; gap: 10px; }
    .listen-card { padding: 22px 18px; }
    .listen-text { font-size: 16px; line-height: 1.95; padding: 14px 16px; max-height: 45vh; }
  }

  /* 入场动画 */
  .question-card { animation: fadeIn 0.35s ease-out; }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>
<div class="app">

  <header>
    <div style="height: 12px;"></div>
  </header>

  <!-- 模式切换 -->
  <div class="mode-tabs">
    <button class="tab active" data-mode="practice">刷题</button>
    <button class="tab" data-mode="listen">听课</button>
    <button class="tab" data-mode="wrong">错题本</button>
    <button class="tab" data-mode="reset">重置</button>
  </div>

  <!-- 控制面板 -->
  <div class="controls" id="controls">
    <div class="ctrl-group">
      <label>科目</label>
      <select id="subjectSel">
        <option value="all">全部五科</option>
        <option value="法理学">法理学</option>
        <option value="宪法学">宪法学</option>
        <option value="法制史">法制史</option>
        <option value="民法">民法</option>
        <option value="刑法">刑法</option>
      </select>
    </div>
    <div class="ctrl-group">
      <label>顺序</label>
      <select id="orderSel">
        <option value="sequential">顺序出题（按章节）</option>
        <option value="random">随机抽题</option>
      </select>
    </div>
  </div>

  <!-- 统计 -->
  <div class="stats" id="stats">
    <div class="stat"><span class="num" id="statTotal">0</span><span class="lbl">已答题数</span></div>
    <div class="stat acc"><span class="num" id="statAcc">0%</span><span class="lbl">空格正确率</span></div>
    <div class="stat"><span class="num" id="statRight">0</span><span class="lbl">全对题数</span></div>
    <div class="stat wrong"><span class="num" id="statWrong">0</span><span class="lbl">错题待重做</span></div>
  </div>

  <!-- 进度条 -->
  <div class="progress-wrap" id="progressWrap">
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    <div class="progress-text">
      <span id="progressLabel">第 1 / 1 题</span>
      <span id="progressSubject">—</span>
    </div>
  </div>

  <!-- 题目卡片 -->
  <div id="quizArea"></div>

  <!-- 错题列表 -->
  <div id="wrongListArea" class="wrong-list"></div>

  <!-- 听课区域 -->
  <div id="listenArea" class="listen-area" style="display:none;">
    <div class="listen-controls">
      <div class="listen-row">
        <div class="ctrl-group">
          <label>科目</label>
          <select id="listenSubject">
            <option value="all">全部五科</option>
            <option value="法理学">法理学</option>
            <option value="宪法学">宪法学</option>
            <option value="法制史">法制史</option>
            <option value="民法">民法</option>
            <option value="刑法">刑法</option>
          </select>
        </div>
        <div class="ctrl-group">
          <label>章节</label>
          <select id="listenChapter"></select>
        </div>
      </div>
      <div class="listen-row">
        <div class="ctrl-group">
          <label>填空读法</label>
          <select id="listenBlankMode">
            <option value="answer">读出答案（背诵）</option>
            <option value="hint">读"序号"（默写）</option>
          </select>
        </div>
        <div class="ctrl-group">
          <label>语速</label>
          <select id="listenRate">
            <option value="0.7">0.7×</option>
            <option value="0.85">0.85×</option>
            <option value="1.0" selected>1.0×</option>
            <option value="1.15">1.15×</option>
            <option value="1.3">1.3×</option>
            <option value="1.5">1.5×</option>
          </select>
        </div>
        <div class="ctrl-group">
          <label>连播</label>
          <select id="listenAutoNext">
            <option value="off">单章重复</option>
            <option value="next" selected>顺序连播</option>
          </select>
        </div>
      </div>
      <div class="listen-row">
        <div class="ctrl-group" style="grid-column: 1 / -1;">
          <label>女声（依设备可用）</label>
          <select id="listenVoice"></select>
        </div>
      </div>
    </div>

    <div class="listen-card">
      <div class="meta">
        <span class="badge" id="listenBadge">—</span>
        <span id="listenChapterTitle">未选择章节</span>
        <span class="qid" id="listenProgress">—</span>
      </div>
      <div class="listen-text" id="listenText">
        选择科目和章节后点击"开始朗读"
      </div>
      <div class="listen-progress">
        <div class="listen-progress-bar"><div class="listen-progress-fill" id="listenProgressFill"></div></div>
      </div>
      <div class="actions">
        <button class="btn" id="listenPrevBtn">← 上一章</button>
        <button class="btn primary" id="listenPlayBtn">▶ 开始朗读</button>
        <button class="btn" id="listenPauseBtn" disabled>⏸ 暂停</button>
        <button class="btn" id="listenStopBtn" disabled>■ 停止</button>
        <button class="btn" id="listenNextBtn">下一章 →</button>
      </div>
      <div class="listen-tip" id="listenTip"></div>
    </div>
  </div>

  <footer>
    <p>· <span id="totalQ">0</span> / <span id="totalB">0</span> ·</p>
  </footer>
</div>

<script>
// 综合题库：法理 / 宪法 / 法制史 / 民法 / 刑法
// 每章一道大题，按 PDF 原始结构和顺序保留所有内容

const QUESTIONS = [
  {
    "id": "fl-一",
    "subject": "法理学",
    "chapter": "第一章 法的概念与本质",
    "question": "法的基本特征：①法是【1】的行为规范；②法是【2】的行为规范；③法是【3】的行为规范；④法是【4】的行为规范。\n\n马克思主义对法的本质的论述：马克思主义法律观的最主要的特征是：从\"【5】\"的关系链来理解法的本质。第一，【6】。第二，【7】。第三，【8】。",
    "answers": [
      [
        "调整人的行为和社会关系"
      ],
      [
        "由国家制定或认可"
      ],
      [
        "规定权利和义务"
      ],
      [
        "由国家强制力保证实施"
      ],
      [
        "国家—阶级关系—物质生活条件",
        "国家-阶级关系-物质生活条件"
      ],
      [
        "法是被奉为法律的国家意志"

<script>
/* ============ 状态管理 ============ */
const STORAGE_KEY = 'lawQuizState_v1';
const SCHEMA_VERSION = 3; // 题库结构变更时递增，会自动清空旧数据

const defaultState = {
  schemaVersion: SCHEMA_VERSION,
  mode: 'practice',          // practice | wrong
  subject: 'all',
  order: 'sequential',
  currentIdx: 0,             // 当前题在 currentList 中的索引
  currentList: [],           // 当前题目 ID 列表
  answered: {},              // { qid: { right: bool, blanks: [...] } }
  wrongIds: [],              // 错题 ID 数组（去重）
  totalAnswered: 0,
  totalRight: 0,
  totalBlanks: 0,
  rightBlanks: 0,
};

let state = loadState();
let currentMode = state.mode || 'practice';

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      // 题库结构变更时清空旧数据
      if (parsed.schemaVersion !== SCHEMA_VERSION) return Object.assign({}, defaultState);
      return Object.assign({}, defaultState, parsed);
    }
  } catch(e) { console.warn('load fail', e); }
  return Object.assign({}, defaultState);
}

function saveState() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e) {}
}

/* ============ 工具 ============ */
function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function buildQuestionList() {
  let pool = QUESTIONS.filter(q => state.subject === 'all' || q.subject === state.subject);
  if (state.order === 'random') pool = shuffle(pool);
  return pool.map(q => q.id);
}

function getQuestionById(id) {
  return QUESTIONS.find(q => q.id === id);
}

function updateProgress() {
  const total = state.currentList.length || 1;
  const cur = Math.min(state.currentIdx + 1, total);
  document.getElementById('progressLabel').textContent = `第 ${cur} / ${total} 题`;
  document.getElementById('progressFill').style.width = `${(cur/total)*100}%`;
  const q = getQuestionById(state.currentList[state.currentIdx]);
  document.getElementById('progressSubject').textContent = q ? `${q.subject} · ${q.chapter}` : '—';
}

/* ============ 渲染：题目卡片 ============ */
function renderQuestion() {
  const area = document.getElementById('quizArea');
  document.getElementById('wrongListArea').classList.remove('show');
  area.style.display = '';

  if (!state.currentList || state.currentList.length === 0) {
    state.currentList = buildQuestionList();
    state.currentIdx = 0;
  }

  if (state.currentIdx >= state.currentList.length) {
    area.innerHTML = `
      <div class="question-card">
        <div class="question-text" style="text-align:center; font-size:22px; padding:40px 0;">
          🌾 已完成全部 ${state.currentList.length} 题
        </div>
        <div class="actions">
          <button class="btn primary" onclick="restartList()">从头再来</button>
          <button class="btn" onclick="switchMode('wrong')">查看错题</button>
        </div>
      </div>`;
    updateProgress();
    return;
  }

  const q = getQuestionById(state.currentList[state.currentIdx]);
  if (!q) { state.currentIdx++; renderQuestion(); return; }

  // 把 question 中的【n】替换为输入框
  const blankCount = q.answers.length;
  // 先把题干中的 HTML 特殊字符转义，再插入输入框 HTML
  let html = q.question
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
  for (let i = 0; i < blankCount; i++) {
    const re = new RegExp('【' + (i+1) + '】', 'g');
    const w = Math.max(80, (q.answers[i][0]?.length || 4) * 18);
    html = html.replace(re, `<span class="blank-num">${i+1}</span><input class="blank-input" data-idx="${i}" autocomplete="off" spellcheck="false" style="min-width:${w}px;">`);
  }
  // 保留换行
  html = html.replace(/\n/g, '<br>');

  const prevAnswer = state.answered[q.id];
  const showAnswers = !!prevAnswer;

  area.innerHTML = `
    <div class="question-card">
      <div class="meta">
        <span class="badge">${q.subject}</span>
        <span>${q.chapter}</span>
        <span class="qid">${q.id}</span>
      </div>
      <div class="question-text">${html}</div>
      <div class="result-banner" id="resultBanner"></div>
      <div class="kbd-hint">
        <span class="kbd">←→↑↓</span> 切换空格 ·
        <span class="kbd">Enter</span> 提交 / 下一题 ·
        <span class="kbd">Tab</span> 下一空
      </div>
      <div class="actions">
        <button class="btn" id="prevBtn" ${state.currentIdx===0?'disabled':''}>← 上一题</button>
        <button class="btn primary" id="checkBtn">提交批改 <span class="kbd">Enter</span></button>
        <button class="btn ghost" id="showAnsBtn">显示答案</button>
        <button class="btn" id="nextBtn">下一题 →</button>
        <button class="btn ghost" id="skipBtn">跳过</button>
      </div>
    </div>`;

  // 事件绑定
  document.getElementById('prevBtn').onclick = () => { if (state.currentIdx>0) { state.currentIdx--; saveState(); renderQuestion(); }};
  document.getElementById('nextBtn').onclick = () => { state.currentIdx++; saveState(); renderQuestion(); };
  document.getElementById('skipBtn').onclick = () => { state.currentIdx++; saveState(); renderQuestion(); };
  document.getElementById('checkBtn').onclick = () => checkAnswer(q);
  document.getElementById('showAnsBtn').onclick = () => {
    // 直接在每个空旁边把正解贴出来（用于不想做想直接背的场景）
    const inputs = area.querySelectorAll('.blank-input');
    inputs.forEach((input, i) => {
      // 已经有 inline-answer 就跳过
      if (input.nextElementSibling && input.nextElementSibling.classList.contains('inline-answer')) return;
      input.disabled = true;
      input.classList.add('reveal');
      const tag = document.createElement('span');
      tag.className = 'inline-answer';
      tag.innerHTML = `<span class="ia-arrow">▸</span><span class="ia-text">${q.answers[i].join(' / ')}</span>`;
      input.insertAdjacentElement('afterend', tag);
    });
  };

  // 全局键盘：
  // Enter = 提交批改 / 已批改后 = 下一题
  // 方向键（←→↑↓）= 在空格之间切换焦点
  // Tab / Shift+Tab = 浏览器原生行为
  if (window._currentKeyHandler) document.removeEventListener('keydown', window._currentKeyHandler);
  const keyHandler = e => {
    const active = document.activeElement;
    const isOurInput = active && active.classList && active.classList.contains('blank-input');
    const inOurArea = isOurInput || (active && area.contains(active));

    // 方向键导航
    if (['ArrowLeft', 'ArrowRight', 'ArrowUp', 'ArrowDown'].includes(e.key)) {
      // 只有焦点在某个空格里，才接管方向键
      if (!isOurInput) return;
      const inputs = Array.from(area.querySelectorAll('.blank-input'));
      const curIdx = inputs.indexOf(active);
      if (curIdx === -1) return;

      // 左右键：仅在光标在文本端点时才跳，否则让浏览器在文本里移动光标
      if (e.key === 'ArrowLeft') {
        if (active.selectionStart === 0 && active.selectionEnd === 0) {
          e.preventDefault();
          const prev = inputs[curIdx - 1];
          if (prev && !prev.disabled) prev.focus();
        }
        return;
      }
      if (e.key === 'ArrowRight') {
        if (active.selectionStart === active.value.length && active.selectionEnd === active.value.length) {
          e.preventDefault();
          const next = inputs[curIdx + 1];
          if (next && !next.disabled) next.focus();
        }
        return;
      }
      // 上下键：直接跳上一个/下一个空格（按 DOM 顺序近似上下）
      if (e.key === 'ArrowUp') {
        e.preventDefault();
        const prev = inputs[curIdx - 1];
        if (prev && !prev.disabled) prev.focus();
        return;
      }
      if (e.key === 'ArrowDown') {
        e.preventDefault();
        const next = inputs[curIdx + 1];
        if (next && !next.disabled) next.focus();
        return;
      }
    }

    // 回车提交 / 进入下一题
    if (e.key === 'Enter') {
      if (!inOurArea && active !== document.body) return;
      e.preventDefault();
      if (state.answered[q.id]) {
        state.currentIdx++;
        saveState();
        renderQuestion();
      } else {
        checkAnswer(q);
      }
    }
  };
  document.addEventListener('keydown', keyHandler);
  window._currentKeyHandler = keyHandler;

  // 输入框：左右切换空格用 Tab；Enter 由全局 handler 处理
  area.querySelectorAll('.blank-input').forEach((input, i) => {
    if (prevAnswer) {
      input.value = prevAnswer.blanks[i] || '';
      input.disabled = true;
      const sc = prevAnswer.scores ? prevAnswer.scores[i] : (prevAnswer.results[i] ? 1 : 0);
      if (sc === 1) input.classList.add('correct');
      else if (sc > 0) input.classList.add('partial');
      else input.classList.add('wrong');
      // 错的或部分对的，旁边贴正解
      if (sc < 1) {
        const tag = document.createElement('span');
        tag.className = 'inline-answer';
        tag.innerHTML = `<span class="ia-arrow">▸</span><span class="ia-text">${q.answers[i].join(' / ')}</span>`;
        input.insertAdjacentElement('afterend', tag);
      }
    }
  });

  if (prevAnswer) {
    // 重新计算这道题的得分用于横幅显示
    let totalScore = 0;
    const scs = prevAnswer.scores || prevAnswer.results.map(r => r ? 1 : 0);
    scs.forEach(s => totalScore += s);
    const ratio = totalScore / scs.length;
    showResultBanner(prevAnswer.right, ratio, scs.length, totalScore);
  }

  // 自动聚焦第一个输入框
  if (!prevAnswer) {
    const first = area.querySelector('.blank-input');
    if (first) first.focus();
  }

  updateProgress();
  updateStats();
}

/* ============ 字符相似度（基于 Levenshtein） ============ */
function levenshtein(a, b) {
  if (a === b) return 0;
  if (!a.length) return b.length;
  if (!b.length) return a.length;
  const dp = Array(b.length + 1).fill(0).map((_, i) => i);
  for (let i = 1; i <= a.length; i++) {
    let prev = dp[0];
    dp[0] = i;
    for (let j = 1; j <= b.length; j++) {
      const tmp = dp[j];
      dp[j] = a[i-1] === b[j-1]
        ? prev
        : Math.min(prev, dp[j], dp[j-1]) + 1;
      prev = tmp;
    }
  }
  return dp[b.length];
}

// 归一化用户输入：去标点空白，便于公平比较
function normalize(s) {
  if (!s) return '';
  return s.trim()
    .replace(/[\s\u3000]/g, '')
    .replace(/[，,、；;]/g, '')
    .replace(/[。.]/g, '')
    .replace(/[（(）)]/g, '')
    .replace(/[：:]/g, '')
    .replace(/[""'']/g, '')
    .replace(/[【】\[\]]/g, '');
}

// 返回 0~1 的得分。从 answers 数组里挑相似度最高那个作为基准。
function scoreBlank(userVal, acceptedList) {
  const u = normalize(userVal);
  if (!u) return { score: 0, best: acceptedList[0] };
  let bestScore = 0;
  let best = acceptedList[0];
  for (const a of acceptedList) {
    const an = normalize(a);
    if (u === an) return { score: 1, best: a };
    const dist = levenshtein(u, an);
    const maxLen = Math.max(u.length, an.length);
    const sim = maxLen === 0 ? 0 : 1 - (dist / maxLen);
    if (sim > bestScore) { bestScore = sim; best = a; }
  }
  return { score: Math.max(0, bestScore), best };
}

/* ============ 批改 ============ */
function checkAnswer(q) {
  const inputs = document.querySelectorAll('#quizArea .blank-input');
  const blanks = [];
  const scores = [];     // 每个空的得分 0~1
  const results = [];    // 每个空是否完全正确（score === 1）
  const bestMatches = []; // 每个空匹配到的标准答案
  let totalScore = 0;

  inputs.forEach((input, i) => {
    const val = input.value.trim();
    blanks.push(val);
    const { score, best } = scoreBlank(val, q.answers[i]);
    scores.push(score);
    bestMatches.push(best);
    const fullyRight = score === 1;
    const partial = score > 0 && score < 1;
    results.push(fullyRight);
    totalScore += score;

    input.disabled = true;
    if (fullyRight) input.classList.add('correct');
    else if (partial) input.classList.add('partial');
    else input.classList.add('wrong');
  });

  const blankScore = totalScore / blanks.length;  // 这道题的整体得分（百分比）
  const allRight = results.every(r => r);

  // 在每个空旁边插入正解（只有不全对时显示，全对时不打扰）
  inputs.forEach((input, i) => {
    if (results[i]) return;
    const tag = document.createElement('span');
    tag.className = 'inline-answer';
    tag.innerHTML = `<span class="ia-arrow">▸</span><span class="ia-text">${q.answers[i].join(' / ')}</span>`;
    input.insertAdjacentElement('afterend', tag);
  });

  // 防止重复计入统计：用得分累加而不是 0/1
  if (!state.answered[q.id]) {
    state.totalAnswered++;
    if (allRight) state.totalRight++;
    state.totalBlanks += blanks.length;
    state.rightBlanks += totalScore;  // 累加小数得分，统计正确率会更平滑
    if (!allRight && !state.wrongIds.includes(q.id)) {
      state.wrongIds.push(q.id);
    }
    if (allRight && state.wrongIds.includes(q.id) && currentMode === 'wrong') {
      state.wrongIds = state.wrongIds.filter(id => id !== q.id);
    }
  }

  state.answered[q.id] = { right: allRight, blanks, results, scores };
  saveState();

  showResultBanner(allRight, blankScore, blanks.length, totalScore);
  updateStats();
  // 批改后让焦点离开输入框，下一次 Enter 才能稳定地被全局 handler 接到
  if (document.activeElement && document.activeElement.blur) document.activeElement.blur();
}

function showResultBanner(right, scoreRatio, blankCount, totalScore) {
  const b = document.getElementById('resultBanner');
  b.classList.add('show');
  const pct = Math.round(scoreRatio * 100);
  if (right) {
    b.classList.add('all-correct');
    b.classList.remove('has-wrong');
    b.innerHTML = '<span class="seal">對</span>全 部 正 確<span class="seal">對</span>';
  } else {
    b.classList.add('has-wrong');
    b.classList.remove('all-correct');
    b.innerHTML = `<span class="seal">${pct}%</span>本 题 得 分 <b>${pct}%</b>（${totalScore.toFixed(1)} / ${blankCount}）<span class="seal">${pct}%</span>`;
  }
}


/* ============ 进度 / 统计 ============ */
function updateStats() {
  document.getElementById('statTotal').textContent = state.totalAnswered;
  const acc = state.totalBlanks ? Math.round((state.rightBlanks / state.totalBlanks) * 100) : 0;
  document.getElementById('statAcc').textContent = acc + '%';
  document.getElementById('statRight').textContent = state.totalRight;
  document.getElementById('statWrong').textContent = state.wrongIds.length;
}

/* ============ 模式切换 ============ */
function switchMode(mode) {
  // 离开听课模式：停止朗读
  if (currentMode === 'listen' && mode !== 'listen') {
    listenStop();
  }

  // 处理 reset 模式
  if (mode === 'reset') {
    if (confirm('确定要重置所有数据吗？\n（清空答题记录、统计、错题本，听课进度也会重置）')) {
      localStorage.removeItem(STORAGE_KEY);
      state = Object.assign({}, defaultState);
      state.subject = document.getElementById('subjectSel').value;
      state.order = document.getElementById('orderSel').value;
      state.currentList = buildQuestionList();
      saveState();
      mode = 'practice';
    } else {
      // 取消，保持原模式
      document.querySelectorAll('.tab').forEach(t => {
        t.classList.toggle('active', t.dataset.mode === currentMode);
      });
      return;
    }
  }

  currentMode = mode;
  state.mode = mode;

  // 切换 tab 高亮
  document.querySelectorAll('.tab').forEach(t => {
    t.classList.toggle('active', t.dataset.mode === mode);
  });

  // 根据模式显示对应区域
  const quizArea = document.getElementById('quizArea');
  const wrongArea = document.getElementById('wrongListArea');
  const listenArea = document.getElementById('listenArea');
  const controls = document.getElementById('controls');
  const stats = document.getElementById('stats');
  const progressWrap = document.getElementById('progressWrap');

  // 默认隐藏
  quizArea.style.display = 'none';
  wrongArea.classList.remove('show');
  listenArea.style.display = 'none';

  if (mode === 'listen') {
    // 听课模式：隐藏刷题相关 UI
    controls.style.display = 'none';
    stats.style.display = 'none';
    progressWrap.style.display = 'none';
    listenArea.style.display = '';
    initListenView();
  } else if (mode === 'wrong') {
    controls.style.display = '';
    stats.style.display = '';
    progressWrap.style.display = '';
    renderWrongList();
  } else {
    // practice
    controls.style.display = '';
    stats.style.display = '';
    progressWrap.style.display = '';
    renderQuestion();
    updateStats();
  }
  saveState();
}

function restartList() {
  state.currentIdx = 0;
  saveState();
  renderQuestion();
}

const listenState = {
  subject: 'all',          // 科目过滤
  chapterId: null,         // 当前章节 id
  blankMode: 'answer',     // answer | hint
  rate: 1.0,
  voiceURI: '',

  isPaused: false,

};

// 中文数字转换 1->一 等（用于读出"序号"模式）
function numToChinese(n) {
  const m = ['零','一','二','三','四','五','六','七','八','九','十'];
  if (n <= 10) return m[n];
  if (n < 20) return '十' + m[n - 10];
  if (n < 100) return m[Math.floor(n/10)] + '十' + (n%10 ? m[n%10] : '');
  return String(n);
}

// 从一道大题生成朗读文本（依据 blankMode 决定怎么处理填空）
function buildSpeechText(q, blankMode) {
  let txt = q.question;
  for (let i = 0; i < q.answers.length; i++) {
    const num = i + 1;
    const placeholder = `【${num}】`;
    let replacement;
    if (blankMode === 'hint') {
      // 默写模式：读"第X空"
      replacement = `（第${numToChinese(num)}空）`;
    } else {
      // 答案模式：读出标准答案的第一个版本
      const ans = q.answers[i][0] || '';
      replacement = ans;
    }
    txt = txt.split(placeholder).join(replacement);
  }
  return txt;
}

// 按句号、问号、分号、换行切句，单句过长再按逗号切
function splitSentences(text) {
  // 先按强标点分大块
  const big = text.split(/(?<=[。！？!?；;])\s*|\n+/).filter(s => s && s.trim());
  const out = [];
  for (const s of big) {
    const trimmed = s.trim();
    if (trimmed.length <= 60) {
      out.push(trimmed);
    } else {
      // 太长按逗号切
      const small = trimmed.split(/(?<=[，,、：:])\s*/).filter(x => x && x.trim());
      let buf = '';
      for (const piece of small) {
        if ((buf + piece).length > 50 && buf) {
          out.push(buf);
          buf = piece;
        } else {
          buf += piece;
        }
      }
      if (buf) out.push(buf);
    }
  }
  return out;
}

// 渲染章节列表
function renderChapterSelect() {
  const sel = document.getElementById('listenChapter');
  const subject = listenState.subject;
  const pool = QUESTIONS.filter(q => subject === 'all' || q.subject === subject);
  sel.innerHTML = pool.map(q =>
    `<option value="${q.id}">${q.subject} · ${q.chapter}</option>`
  ).join('');
  if (listenState.chapterId && pool.find(q => q.id === listenState.chapterId)) {
    sel.value = listenState.chapterId;
  } else if (pool.length > 0) {
    listenState.chapterId = pool[0].id;
    sel.value = listenState.chapterId;
  }
}

// 渲染当前章节内容到屏幕
function renderListenContent() {
  const q = QUESTIONS.find(x => x.id === listenState.chapterId);
  if (!q) return;
  document.getElementById('listenBadge').textContent = q.subject;
  document.getElementById('listenChapterTitle').textContent = q.chapter;

  // 把题干渲染成可读的 HTML：填空位置根据 blankMode 显示
  let html = q.question
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
  for (let i = 0; i < q.answers.length; i++) {
    const num = i + 1;
    const re = new RegExp(`【${num}】`, 'g');
    let display;
    if (listenState.blankMode === 'hint') {
      display = `<span class="blank-num-inline">[第${numToChinese(num)}空]</span>`;
    } else {
      display = `<span class="blank-mark">${q.answers[i][0]}</span>`;
    }
    html = html.replace(re, display);
  }
  html = html.replace(/\n/g, '<br>');

  // 把每个句子包装一下，便于高亮
  // 简单做：把整段先按句子切分，分别包 <span class="sentence">
  // 但 HTML 里有了 br/span，直接切会破坏结构。退而求其次：先生成 plain 版用于切句、记录索引；显示用 html 不切。
  // 这里高亮用滚动定位句子文本来实现：在 listenText 里我们用 plain 文本切成 sentence span
  const speechPlain = buildSpeechText(q, listenState.blankMode);
  const sentences = splitSentences(speechPlain);
  listenState.sentences = sentences;

  // 渲染：把 plain 文本以 sentence span 形式渲染（保留段落感）
  // 简单方案：把 sentences 用 span 包，按行排列
  const sentencesHtml = sentences.map((s, i) =>
    `<span class="sentence" data-idx="${i}">${escapeHtml(s)}</span>`
  ).join('');
  document.getElementById('listenText').innerHTML = sentencesHtml;
  updateListenProgress();
}

function escapeHtml(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function updateListenProgress() {
  const total = listenState.sentences.length || 1;
  const cur = Math.min(listenState.sentenceIdx + 1, total);
  document.getElementById('listenProgress').textContent = `${cur} / ${total}`;
  document.getElementById('listenProgressFill').style.width = `${(cur/total)*100}%`;
}

function highlightSentence(idx) {
  const all = document.querySelectorAll('#listenText .sentence');
  all.forEach(el => el.classList.remove('active'));
  const cur = document.querySelector(`#listenText .sentence[data-idx="${idx}"]`);
  if (cur) {
    cur.classList.add('active');
    // 滚动到 listenText 容器内可见位置（不影响页面整体滚动）
    const container = document.getElementById('listenText');
    const cTop = container.getBoundingClientRect().top;
    const sTop = cur.getBoundingClientRect().top;
    const offset = sTop - cTop - container.clientHeight / 2 + cur.clientHeight / 2;
    container.scrollTop += offset;
  }
}

// 选择最佳的中文女声
function pickBestVoice(voices) {
  // 优先级：保存的 voiceURI > 中文女声关键词 > 任一中文 > 默认
  if (listenState.voiceURI) {
    const v = voices.find(x => x.voiceURI === listenState.voiceURI);
    if (v) return v;
  }
  const zh = voices.filter(v => /zh|chinese|cmn/i.test(v.lang) || /zh|chinese|cmn/i.test(v.name));
  if (zh.length === 0) return voices[0];

  // 关键词排序（女声常见标识）
  const femalePatterns = [
    /tingting/i, /ting-ting/i, /xiaoxiao/i, /xiaoyi/i, /yaoyao/i, /huihui/i,
    /yating/i, /mei-jia/i, /female/i, /女/i, /siri.*女/i, /lily/i,
    /yunyang/i, /xiaomeng/i,
  ];
  for (const pat of femalePatterns) {
    const m = zh.find(v => pat.test(v.name) || pat.test(v.voiceURI));
    if (m) return m;
  }
  // 第二轮：排除明显男声
  const maleExclude = /male|男|kangkang|yunjian|yunxi|yunxia/i;
  const fallback = zh.find(v => !maleExclude.test(v.name) && !maleExclude.test(v.voiceURI));
  return fallback || zh[0];
}

function renderVoiceList() {
  const sel = document.getElementById('listenVoice');
  const voices = window.speechSynthesis.getVoices();
  const zh = voices.filter(v => /zh|chinese|cmn/i.test(v.lang) || /zh|chinese|cmn/i.test(v.name));
  if (zh.length === 0) {
    sel.innerHTML = `<option value="">（设备无中文语音，请检查系统设置）</option>`;
    document.getElementById('listenTip').textContent = '提示：iOS 用户在 设置→辅助功能→旁白→语音 添加中文女声；Windows 用户在 设置→时间和语言→语音 添加普通话语音包';
    return;
  }
  sel.innerHTML = zh.map(v => {
    const tag = /female|tingting|xiaoxiao|xiaoyi|yaoyao|huihui|lily|mei.*jia|yating/i.test(v.name + v.voiceURI) ? '（女）' : '';
    return `<option value="${v.voiceURI}">${v.name}${tag} — ${v.lang}</option>`;
  }).join('');
  // 默认选女声
  const best = pickBestVoice(voices);
  if (best) {
    sel.value = best.voiceURI;
    listenState.voiceURI = best.voiceURI;
  }
}

let _voicesLoaded = false;
function ensureVoicesLoaded(cb) {
  if (_voicesLoaded) { cb(); return; }
  const voices = window.speechSynthesis.getVoices();
  if (voices.length > 0) { _voicesLoaded = true; cb(); return; }
  window.speechSynthesis.addEventListener('voiceschanged', () => {
    if (_voicesLoaded) return;
    _voicesLoaded = true;
    renderVoiceList();
    cb();
  }, { once: true });
}

// 朗读单句
let _currentUtterance = null;
let _stopRequested = false;

function speakSentence(idx, onEnd) {
  if (idx >= listenState.sentences.length) {
    if (onEnd) onEnd('finished');
    return;
  }
  const text = listenState.sentences[idx];
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'zh-CN';
  u.rate = listenState.rate;
  u.pitch = 1.0;
  u.volume = 1.0;

  const voices = window.speechSynthesis.getVoices();
  const v = voices.find(x => x.voiceURI === listenState.voiceURI);
  if (v) u.voice = v;

  highlightSentence(idx);
  listenState.sentenceIdx = idx;
  updateListenProgress();

  u.onend = () => {
    if (_stopRequested) { _stopRequested = false; return; }
    if (idx + 1 < listenState.sentences.length) {
      // 句末稍作停顿，更自然
      setTimeout(() => speakSentence(idx + 1, onEnd), 180);
    } else {
      if (onEnd) onEnd('chapter-end');
    }
  };
  u.onerror = (e) => {
    console.warn('TTS error', e);
    if (idx + 1 < listenState.sentences.length) {
      setTimeout(() => speakSentence(idx + 1, onEnd), 250);
    } else {
      if (onEnd) onEnd('error');
    }
  };

  _currentUtterance = u;
  window.speechSynthesis.speak(u);
}

// Chrome bug 修复：speechSynthesis 长时间播放会卡住，定期 pause/resume 保活
let _keepAliveTimer = null;
function startKeepAlive() {
  stopKeepAlive();
  _keepAliveTimer = setInterval(() => {
    if (window.speechSynthesis.speaking && !window.speechSynthesis.paused) {
      window.speechSynthesis.pause();
      window.speechSynthesis.resume();
    }
  }, 10000);
}
function stopKeepAlive() {
  if (_keepAliveTimer) clearInterval(_keepAliveTimer);
  _keepAliveTimer = null;
}

function onChapterEnd(reason) {
  if (listenState.autoNext === 'next' && reason === 'chapter-end') {
    // 自动连播下一章
    const pool = QUESTIONS.filter(q => listenState.subject === 'all' || q.subject === listenState.subject);
    const curIdx = pool.findIndex(q => q.id === listenState.chapterId);
    if (curIdx >= 0 && curIdx + 1 < pool.length) {
      listenState.chapterId = pool[curIdx + 1].id;
      document.getElementById('listenChapter').value = listenState.chapterId;
      renderListenContent();
      listenSaveSettings();
      // 章节间停顿
      setTimeout(() => speakSentence(0, onChapterEnd), 800);
      return;
    } else {
      // 全部播完
      listenStop();
      document.getElementById('listenTip').textContent = '✓ 已播完所选范围';
      return;
    }
  }
  if (listenState.autoNext === 'off' && reason === 'chapter-end') {
    // 单章重复
    setTimeout(() => speakSentence(0, onChapterEnd), 1200);
    return;
  }
  // 其他情况：停止
  listenStop();
}

function listenPlay() {
  if (!('speechSynthesis' in window)) {
    alert('当前浏览器不支持语音朗读，请使用 Chrome / Edge / Safari 最新版');
    return;
  }
  // 如果暂停状态，恢复
  if (listenState.isPaused) {
    window.speechSynthesis.resume();
    listenState.isPaused = false;
    listenState.isPlaying = true;
    updateListenButtons();
    startKeepAlive();
    return;
  }
  // 否则从当前句开始
  _stopRequested = false;
  listenState.isPlaying = true;
  listenState.isPaused = false;
  updateListenButtons();
  startKeepAlive();
  // 取消之前可能的残留
  window.speechSynthesis.cancel();
  setTimeout(() => speakSentence(listenState.sentenceIdx || 0, onChapterEnd), 100);
  document.getElementById('listenTip').textContent = '';
}

function listenPause() {
  if (window.speechSynthesis.speaking) {
    window.speechSynthesis.pause();
    listenState.isPaused = true;
    listenState.isPlaying = false;
    updateListenButtons();
    stopKeepAlive();
  }
}

function listenStop() {
  _stopRequested = true;
  window.speechSynthesis.cancel();
  listenState.isPlaying = false;
  listenState.isPaused = false;
  listenState.sentenceIdx = 0;
  stopKeepAlive();
  updateListenButtons();
  updateListenProgress();
  // 清除高亮
  document.querySelectorAll('#listenText .sentence.active').forEach(el => el.classList.remove('active'));
}

function updateListenButtons() {
  const playBtn = document.getElementById('listenPlayBtn');
  const pauseBtn = document.getElementById('listenPauseBtn');
  const stopBtn = document.getElementById('listenStopBtn');
  if (listenState.isPlaying) {
    playBtn.textContent = '▶ 朗读中…';
    playBtn.disabled = true;
    pauseBtn.disabled = false;
    stopBtn.disabled = false;
  } else if (listenState.isPaused) {
    playBtn.textContent = '▶ 继续';
    playBtn.disabled = false;
    pauseBtn.disabled = true;
    stopBtn.disabled = false;
  } else {
    playBtn.textContent = '▶ 开始朗读';
    playBtn.disabled = false;
    pauseBtn.disabled = true;
    stopBtn.disabled = true;
  }
}

function listenJumpChapter(direction) {
  // direction: -1 上一章 / +1 下一章
  const pool = QUESTIONS.filter(q => listenState.subject === 'all' || q.subject === listenState.subject);
  let curIdx = pool.findIndex(q => q.id === listenState.chapterId);
  if (curIdx === -1) curIdx = 0;
  const newIdx = curIdx + direction;
  if (newIdx < 0 || newIdx >= pool.length) return;
  listenStop();
  listenState.chapterId = pool[newIdx].id;
  document.getElementById('listenChapter').value = listenState.chapterId;
  renderListenContent();
  listenSaveSettings();
}

let _listenInitialized = false;
function initListenView() {
  if (!_listenInitialized) {
    _listenInitialized = true;
    listenLoadSettings();
    // 加载语音
    ensureVoicesLoaded(() => {
      renderVoiceList();
      // 恢复上次保存的 voice
      if (state.listen && state.listen.voiceURI) {
        const sel = document.getElementById('listenVoice');
        if ([...sel.options].some(o => o.value === state.listen.voiceURI)) {
          sel.value = state.listen.voiceURI;
          listenState.voiceURI = state.listen.voiceURI;
        }
      }
    });
    // 立即尝试一次
    renderVoiceList();

    // 绑定事件
    document.getElementById('listenSubject').value = listenState.subject;
    document.getElementById('listenSubject').addEventListener('change', e => {
      listenStop();
      listenState.subject = e.target.value;
      listenState.chapterId = null;
      renderChapterSelect();
      renderListenContent();
      listenSaveSettings();
    });
    document.getElementById('listenChapter').addEventListener('change', e => {
      listenStop();
      listenState.chapterId = e.target.value;
      renderListenContent();
      listenSaveSettings();
    });
    document.getElementById('listenBlankMode').value = listenState.blankMode;
    document.getElementById('listenBlankMode').addEventListener('change', e => {
      listenStop();
      listenState.blankMode = e.target.value;
      renderListenContent();
      listenSaveSettings();
    });
    document.getElementById('listenRate').value = String(listenState.rate);
    document.getElementById('listenRate').addEventListener('change', e => {
      listenState.rate = parseFloat(e.target.value);
      listenSaveSettings();
    });
    document.getElementById('listenAutoNext').value = listenState.autoNext;
    document.getElementById('listenAutoNext').addEventListener('change', e => {
      listenState.autoNext = e.target.value;
      listenSaveSettings();
    });
    document.getElementById('listenVoice').addEventListener('change', e => {
      listenState.voiceURI = e.target.value;
      listenSaveSettings();
    });

    document.getElementById('listenPlayBtn').addEventListener('click', listenPlay);
    document.getElementById('listenPauseBtn').addEventListener('click', listenPause);
    document.getElementById('listenStopBtn').addEventListener('click', listenStop);
    document.getElementById('listenPrevBtn').addEventListener('click', () => listenJumpChapter(-1));
    document.getElementById('listenNextBtn').addEventListener('click', () => listenJumpChapter(1));

    // 点击句子跳转
    document.getElementById('listenText').addEventListener('click', e => {
      const s = e.target.closest('.sentence');
      if (!s) return;
      const idx = parseInt(s.dataset.idx, 10);
      if (Number.isFinite(idx)) {
        listenStop();
        listenState.sentenceIdx = idx;
        updateListenProgress();
        // 立即开始播
        listenPlay();
      }
    });
  }

  // 每次进入听课模式刷新一遍
  renderChapterSelect();
  renderListenContent();
  updateListenButtons();
}

/* ============ 初始化 ============ */
function init() {
  document.getElementById('totalQ').textContent = QUESTIONS.length;
  document.getElementById('totalB').textContent = QUESTIONS.reduce((s,q)=>s+q.answers.length, 0);

  // 恢复 UI
  document.getElementById('subjectSel').value = state.subject;
  document.getElementById('orderSel').value = state.order;

  // 切科目/顺序时重建
  document.getElementById('subjectSel').addEventListener('change', e => {
    state.subject = e.target.value;
    state.currentList = buildQuestionList();
    state.currentIdx = 0;
    saveState();
    if (currentMode === 'practice') renderQuestion();
  });
  document.getElementById('orderSel').addEventListener('change', e => {
    state.order = e.target.value;
    state.currentList = buildQuestionList();
    state.currentIdx = 0;
    saveState();
    if (currentMode === 'practice') renderQuestion();
  });

  // tab 切换
  document.querySelectorAll('.tab').forEach(t => {
    t.addEventListener('click', () => switchMode(t.dataset.mode));
  });

  // 初始题目列表
  if (!state.currentList || state.currentList.length === 0) {
    state.currentList = buildQuestionList();
  }

  // 进入正确模式
  switchMode(currentMode);
}

window.addEventListener('DOMContentLoaded', init);
</script>
